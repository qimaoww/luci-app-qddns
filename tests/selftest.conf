config qddns 'main'
	option enabled '1'
	option state_dir '/tmp/qddns-selftest-state'
	option log_dir '/tmp/qddns-selftest-log'

config source 'wan4'
	option type 'local_addr'
	option family 'ipv4'
	option address '198.51.100.77'

config provider 'custom'
	option type 'custom_http'
	option lookup_url 'http://127.0.0.1:35353/lookup'
	option url 'http://127.0.0.1:35353/update'
	option method 'POST'
	option body_template '{"ip":"{{ip}}","record":"{{record_name}}","zone":"{{zone}}","result":"updated"}'
	option success_contains 'updated'

config rule 'home'
	option enabled '1'
	option provider 'custom'
	option source 'wan4'
	option record_type 'A'
	option zone 'example.com'
	option record_name 'home'
	option ttl '300'
	option proxied '0'
	option check_interval '60'
	option force_interval '3600'
	option retry_count '3'
	option retry_backoff '30'
